<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Salon & Spa</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="logo.png">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" />
    
    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Inter', sans-serif;
        }
        .thank-you-card {
            background-color: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        .check-icon {
            width: 80px;
            margin-bottom: 20px;
        }
        h1 {
            color: #28a745;
            margin-bottom: 15px;
        }
        p {
            color: #6c757d;
            font-size: 18px;
            margin-bottom: 30px;
        }
        .btn-home {
            background-color: #4112ad;
            color: white;
            padding: 10px 30px;
            border-radius: 8px;
            text-decoration: none;
            transition: background 0.3s;
        }
        .btn-home:hover {
            background-color: #310d8a;
            color: white;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="thank-you-card">
        <img src="check-icon.png" alt="Success" class="check-icon">
        <h1>Thank You!</h1>
        <p>Your booking has been confirmed successfully. We look forward to seeing you soon!</p>
        <a href="index.html" class="btn-home">Back to Home</a>
    </div>

</body>
</html>
