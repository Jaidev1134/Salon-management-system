<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book an Appointment | Salon & Spa</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="logo.png">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous" />
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/main.css">

    <style>
        .form-all {
            font-family: 'Inter', sans-serif;
            max-width: 752px;
            width: 100%;
            margin: 20px auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        .header-logo {
            text-align: center;
            margin-bottom: 20px;
        }
        .custom-button {
            color: white;
            background-color: #4112ad;
            width: 130px;
            height: 45px;
            border-width: 0;
            border-radius: 8px;
            cursor: pointer;
            display: block;
            margin: 20px auto;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .custom-button:hover {
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            transform: scale(1.1);
        }
        .form-section {
            list-style: none;
            padding: 0;
        }
        .form-line {
            margin-bottom: 15px;
        }
        .form-label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }
        .form-textbox, .form-dropdown, .form-radio {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .form-radio-item {
            display: block;
            margin-bottom: 5px;
        }
    </style>
</head>
<body style="background-color: #E24059; padding-top: 50px;">

    <div class="form-all">
        <div class="header-logo">
            <img src="salonlogo-removebg-preview.png" alt="Salon Logo" width="200">
        </div>
        <h1 class="text-center" style="color: #2C3345;">Make an Appointment</h1>
        
        <form action="thank.html" method="post">
            <ul class="form-section">
                <li class="form-line">
                    <label class="form-label">Full Name*</label>
                    <input type="text" name="name" class="form-textbox" placeholder="Enter your full name" required>
                </li>
                <li class="form-line">
                    <label class="form-label">Email*</label>
                    <input type="email" name="email" class="form-textbox" placeholder="example@example.com" required>
                </li>
                <li class="form-line">
                    <label class="form-label">Phone Number*</label>
                    <input type="tel" name="phone" class="form-textbox" placeholder="000 000 0000" required>
                </li>
                <li class="form-line">
                    <label class="form-label">Gender</label>
                    <div class="form-radio-item">
                        <input type="radio" name="gender" value="Male"> Male
                    </div>
                    <div class="form-radio-item">
                        <input type="radio" name="gender" value="Female"> Female
                    </div>
                    <div class="form-radio-item">
                        <input type="radio" name="gender" value="Other"> Other
                    </div>
                </li>
                <li class="form-line">
                    <label class="form-label">Preferred Date*</label>
                    <input type="date" name="date" class="form-textbox" required>
                </li>
                <li class="form-line">
                    <label class="form-label">Schedule Preference*</label>
                    <select name="schedule" class="form-textbox" required>
                        <option value="">Select a slot</option>
                        <option value="Morning 9-11">Morning Session - 9:00AM to 11:00AM</option>
                        <option value="Morning 11-1">Morning Session - 11:00AM to 1:00PM</option>
                        <option value="Afternoon 5:30-7:30">Afternoon Session - 5:30PM to 7:30PM</option>
                        <option value="Evening 7:30-9:30">Evening Session - 7:30PM to 9:30PM</option>
                    </select>
                </li>
            </ul>
            <button class="custom-button" type="submit">Book Now</button>
        </form>
    </div>

</body>
</html>
